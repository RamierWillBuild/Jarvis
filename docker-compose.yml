services:
  api:
    build: ./backend
    container_name: jarvis-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Inside the compose network the frontend reaches the API by service name,
      # but CORS must allow the browser origin (localhost:5173).
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    volumes:
      - ./backend:/app          # hot reload: source mounted into the container
      - jarvis_data:/app/data   # persist the SQLite db + settings
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: jarvis-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app         # hot reload: source mounted into the container
      - /app/node_modules       # keep container's installed deps
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - api
    restart: unless-stopped

volumes:
  jarvis_data:
